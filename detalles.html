<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streaming Web</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="/css/detalles.css">
  </head>
  <body>
    <header>
      <nav class="navbar navbar-dark navbar-expand-lg mi-nav">
        <div
          class="container-fluid d-flex justify-content-between align-items-center"
        >
          <button
            class="navbar-toggler order-1"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <a class="navbar-brand order-2 mx-auto" href="#"
            ><img class="logo" src="/assets/logo.png" alt=""
          /></a>

          <div class="nav-item dropdown order-3 ms-lg-4">
            <a
              class="nav-link dropdown-toggle p-0"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
            >
              <img
                src="/assets/foto-usuario.png"
                class="rounded-circle border object-fit-cover"
                style="width: 35px; height: 35px"
                alt="Perfil"
              />
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow">
              <li><a class="dropdown-item" href="#">Mi Perfil</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item text-danger" href="#">Cerrar Sesión</a>
              </li>
            </ul>
          </div>

          <div
            class="collapse navbar-collapse order-4 order-lg-2"
            id="navbarSupportedContent"
          >
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
              <li class="nav-item mx-2">
                <a class="nav-link active" aria-current="page" href="#"
                  >Inicio</a
                >
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link active" aria-current="page" href="#"
                  >Login</a
                >
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link active" aria-current="page" href="#"
                  >Contacto</a
                >
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link active" aria-current="page" href="#"
                  >Sobre nosotros</a
                >
              </li>
            </ul>

            <form class="d-flex ms-lg-3" role="search">
              <input
                class="form-control me-2 input-buscar"
                type="search"
                placeholder="Buscar"
                aria-label="Search"
              />
              <button class="btn btn-buscar" type="submit">Buscar</button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <main class="text-white min-vh-100">
      <!-- SECCIÓN 1: EL TRAILER (Hero) -->
      <section class="row g-0">
        <div class="col-12">
          <div class="ratio ratio-21x9 shadow-lg">
            <iframe style="object-fit: cover;" src="https://www.youtube.com/embed/8RBSv-fPoJU?si=sNoEpNh8UXGS0d6q" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
          </div>
        </div>
      </section>

    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <body>
</html>
