<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Contactos Bootstrap</title>
    <style>
        body{
    position: relative;
    background-image: url('/assets/nexora_black.png');
    background-size: cover;
    background-position: center;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,.05);
    z-index:0;
}
.container-fluid{
    position: relative;
    z-index: 1;
}

nav{
    position: relative;
    z-index: 1;
}
a{
    text-decoration: none;
    color: rgb(250, 8, 8);
    
}
h4, label, textarea{
    color: white;
}
h4{
    text-align:start;
    color: rgba(238, 137, 5, 0.918);
}
input::placeholder{
    background: rgba(0, 0, 0, 0.06);
}
.maps{
    width: 100%;
    display: flex;
    justify-content:space-around;
    position:sticky;
    
}

</style>
</head>
<body> 
    <nav>
        <div class="d-flex flex-row-reverse mb-3 gap-3">
    <a href="contactos.html">dark mode</a>
<a href="contactos_blanco.html">light mode</a>
<a href="contactos_bootstrap.html">Bootstrap</a>
</div>
</nav>
 <!-- ///////////////////FORM //////////////////////// -->
 <div class="container-fluid">  
    <h4>Contactos</h4> 
 <form>
        <div class="mb-3">
    <label for="name" class="form-label">Nombre</label>
    <input type="text" class="form-control" id="name" aria-describedby="nameHelp" required placeholder="Cosmes Fulanito">
    
  </div>
  <div class="mb-3">
    <label for="phone" class="form-label">Teléfono</label>
    <input type="phone" class="form-control" id="phone" aria-describedby="phone" required placeholder="381-1234567">
    
  </div>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required placeholder="Cosmes_Fulanito@gmail.com">
    <br>
    <!--//////////////// TEXTAREAR////////////// -->
    <label for="floatingTextarea">Sugerencias</label>
    <div class="form-floating">
  <textarea class="form-control"  id="floatingTextarea" placeholder="Escribinos tu sugerencia"></textarea>
</div>
  </div>
<!--//////////////// BOTON /////////////// -->
  <button type="submit" class="btn btn-primary">Submit</button>
</form>  <br><br>
</div>
<div class="maps">
    <img src="/assets/Working Jim Carrey GIF.gif" alt="jim Carrey">

</div>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
